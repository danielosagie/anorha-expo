name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - name: TypeScript
        run: npm run typecheck

  # Contract drift-check: the committed DB types must match the live schema.
  # Requires repo secrets SUPABASE_ACCESS_TOKEN + EXPO_PUBLIC_SUPABASE_PROJECT_ID.
  # Skips automatically if the project id isn't configured.
  db-types-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check generated DB types are up to date
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EXPO_PUBLIC_SUPABASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_SUPABASE_PROJECT_ID }}
        run: |
          if [ -z "$EXPO_PUBLIC_SUPABASE_PROJECT_ID" ]; then
            echo "No project id configured; skipping drift check."; exit 0
          fi
          npx --yes supabase gen types typescript \
            --project-id "$EXPO_PUBLIC_SUPABASE_PROJECT_ID" --schema public > /tmp/db.generated.ts
          # NOTE: src/types/database.types.ts is currently a curated, Zod-derived view.
          # Once it is fully generated, replace this informational diff with a hard
          # `diff -q` gate so drift fails the build.
          diff /tmp/db.generated.ts src/types/database.types.ts || \
            echo "::warning::database.types.ts differs from generated schema — review for drift."
