name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # package-lock.json is not committed, so use install (not ci).
      # Committing the lockfile + switching to `npm ci` is a recommended follow-up.
      - run: npm install --legacy-peer-deps
      - run: npm run typecheck
